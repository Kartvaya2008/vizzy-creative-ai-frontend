<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vizzy Chat</title>
  <link rel="icon" type="image/x-icon" href="logo.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="logo.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       SIDEBAR — shared across both pages
  ══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Toggle / Close -->
    <button class="sidebar-btn toggle-btn" id="toggleBtn" title="Toggle Sidebar">
      <svg class="icon-menu" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="icon-close" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6"  x2="6"  y2="18"/>
        <line x1="6"  y1="6"  x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Home button -->
    <button class="sidebar-btn" id="homeBtn" title="Home" onclick="goHome()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="sidebar-label">Home</span>
    </button>

    <!-- New Chat -->
    <button class="sidebar-btn new-chat-btn" title="New Chat" onclick="newChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
      <span class="sidebar-label">New Chat</span>
    </button>

    <div class="sidebar-divider"></div>

    <!-- History -->
    <button class="sidebar-btn active" title="Chat History" id="historyToggleBtn" onclick="toggleHistory()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="sidebar-label">History</span>
    </button>

    <!-- Search — Coming Soon -->
    <button class="sidebar-btn coming-soon-btn" title="Coming Soon" onclick="showComingSoon()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="sidebar-label">Search</span>
      <span class="coming-soon-tag">Soon</span>
    </button>

    <!-- History Panel -->
    <div class="history-panel" id="historyPanel">
      <div class="history-title">Recent Chats</div>
      <div id="historyList" class="history-list"></div>
    </div>

  </aside>

  <!-- ══════════════════════════════════════
       PAGE: LANDING (home)
  ══════════════════════════════════════ -->
  <main class="page page-home active" id="pageHome">
    <div class="hero">

      <!-- Brand mark top-left -->
      <div class="brand-mark" style="position:absolute;top:20px;left:24px;z-index:1;">
        <img src="logo.ico" alt="Vizzy Chat Logo" width="20" height="20" style="display:inline-block;vertical-align:middle;margin-right:6px;border-radius:4px;" />
        <span class="brand-name">Vizzy Chat</span>
      </div>

      <div class="hero-content">
        <h1 class="hero-title">
          Turn Your Ideas into<br>
          <span class="hero-highlight" id="heroHighlight">Visual</span><span class="typing-cursor"></span>
        </h1>
        <p class="hero-sub">
          Vizzy Chat is an AI-powered creative assistant that transforms your ideas into images, stories,<br>
          videos, and designs — all through a simple chat interface.
        </p>

        <!-- Landing input card -->
        <div class="input-card" id="landingInputCard">
          <input
            type="text"
            id="landing-input"
            class="main-input"
            placeholder="Ask anything"
            autocomplete="off"
            autofocus
          />
          <div class="input-toolbar">
            <div class="dropdown-wrapper">
              <button class="toolbar-btn" title="More options" onclick="toggleDropdown('landingDropdown', event)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <div class="dropdown-menu hidden" id="landingDropdown">
                <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  Add photos &amp; files <span class="dropdown-soon-tag">Coming Soon</span>
                </button>
                <button class="dropdown-item" onclick="setMode('image'); toggleDropdown('landingDropdown', event); document.getElementById('landing-input').focus()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                  Create image
                </button>
                <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                  Thinking <span class="dropdown-soon-tag">Coming Soon</span>
                </button>
                <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  Deep research <span class="dropdown-soon-tag">Coming Soon</span>
                </button>
              </div>
            </div>
            <div style="flex:1"></div>
            <button class="send-btn" id="landing-send-btn" title="Send" onclick="landingSend()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"/>
                <polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="landing-footer">Vizzy Chat — Don't just imagine. Create.</div>
    </div>
  </main>

  <!-- ══════════════════════════════════════
       PAGE: CHAT
  ══════════════════════════════════════ -->
  <main class="page page-chat" id="pageChat">
    <div class="chat-container">

      <!-- Chat Header -->
      <header class="chat-header">
        <div class="chat-header-inner">
          <!-- Home link in header -->
          <button class="brand-mark brand-btn" onclick="goHome()" title="Go to Home">
            <img src="logo.ico" alt="Vizzy Chat Logo" width="18" height="18" style="display:inline-block;vertical-align:middle;margin-right:6px;border-radius:3px;" />
            <span class="brand-name">Vizzy Chat</span>
          </button>
          <div class="mode-badge hidden" id="modeBadge">🎨 Image Mode</div>
          <button class="new-chat-link" onclick="newChat()">+ New Chat</button>
        </div>
      </header>

      <!-- Messages -->
      <div id="chat-box"></div>

      <!-- Typing indicator -->
      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-indicator-inner">
          <div class="typing-bubble">
            <span></span><span></span><span></span>
            <span class="typing-label" id="typingLabel">Thinking…</span>
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-wrapper">
        <div class="chat-input-inner">
          <div class="input-card" id="inputCard">
            <textarea
              id="user-input"
              class="main-input"
              placeholder="Ask anything"
              autocomplete="off"
              rows="1"
            ></textarea>
            <div class="input-toolbar">
              <div class="dropdown-wrapper">
                <button class="toolbar-btn" title="More options" onclick="toggleDropdown('chatDropdown', event)">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                </button>
                <div class="dropdown-menu hidden" id="chatDropdown">
                  <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    Add photos &amp; files <span class="dropdown-soon-tag">Coming Soon</span>
                  </button>
                  <button class="dropdown-item" onclick="setMode('image'); toggleDropdown('chatDropdown', event)">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Create image
                  </button>
                  <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                    Thinking <span class="dropdown-soon-tag">Coming Soon</span>
                  </button>
                  <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Deep research <span class="dropdown-soon-tag">Coming Soon</span>
                  </button>
                  <button class="dropdown-item dropdown-item-soon" onclick="showComingSoon()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    More <span class="dropdown-soon-tag">Coming Soon</span>
                  </button>
                </div>
              </div>

              <!-- Story pill -->
              <button class="story-pill" id="storyModeBtn" title="Story Mode" onclick="setMode('story')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Story
              </button>

              <!-- Image pill -->
              <button class="image-pill" id="imageModeBtn" title="Image Mode" onclick="setMode('image')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                Image
              </button>

              <div style="flex:1"></div>
              <button class="send-btn" id="send-btn" title="Send" onclick="sendMessage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="19" x2="12" y2="5"/>
                  <polyline points="5 12 12 5 19 12"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Coming Soon Toast -->
  <div class="cs-toast hidden" id="csToast">🚀 Coming Soon!</div>

  <script src="script.js"></script>
</body>
</html>
